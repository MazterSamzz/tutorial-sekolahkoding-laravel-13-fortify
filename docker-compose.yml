name: ${PROJECT_NAME}

x-default-settings: &default-settings
  restart: no
  networks:
    - app_network

services:
  nginx:
    <<: *default-settings
    image: nginx:1.29
    ports:
      - '${APP_PORT_HOST:-8080}:80'
    volumes:
      - ./apps/laravel:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    <<: *default-settings
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID}
    working_dir: /var/www/html
    volumes:
      - ./apps/laravel:/var/www/html

  mysql:
    <<: *default-settings
    image: mysql:8.4
    ports:
      - '${DB_PORT_HOST:-3306}:3306'
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    <<: *default-settings
    image: phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
    ports:
      - 8081:80
    depends_on:
      - mysql

networks:
  app_network:
    external: false
    name: app_network
    driver: bridge

volumes:
  mysql_data:
